name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry rawcutapi2025 \
            --image rawcut-api:latest \
            --image rawcut-api:${{ github.sha }} \
            ./backend/

      - name: Deploy new revision to Container Apps
        run: |
          az containerapp update \
            --name rawcut-api \
            --resource-group rawcut-rg \
            --image rawcutapi2025.azurecr.io/rawcut-api:${{ github.sha }}
