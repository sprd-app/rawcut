name: Rawcut
options:
  bundleIdPrefix: com.rawcut
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "rawcut needs access to your photos and videos to sync them to the cloud."
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: "rawcut saves edited videos to your photo library."
    INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "rawcut uses speech recognition for voice-to-text script input."
    INFOPLIST_KEY_NSMicrophoneUsageDescription: "rawcut uses the microphone for voice-to-text script input."

targets:
  Rawcut:
    type: application
    platform: iOS
    info:
      path: Rawcut/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        BGTaskSchedulerPermittedIdentifiers:
          - com.rawcut.app.sync
          - com.rawcut.app.processing
        NSPhotoLibraryUsageDescription: "rawcut needs access to your photos and videos to sync them to the cloud."
        NSPhotoLibraryAddUsageDescription: "rawcut saves edited videos to your photo library."
        NSSpeechRecognitionUsageDescription: "rawcut uses speech recognition for voice-to-text script input."
        NSMicrophoneUsageDescription: "rawcut uses the microphone for voice-to-text script input."
    sources:
      - path: Rawcut
        excludes:
          - "**/*.xcstrings"
    resources:
      - path: Rawcut/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rawcut.app
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_BGTaskSchedulerPermittedIdentifiers: "$(PRODUCT_BUNDLE_IDENTIFIER).sync $(PRODUCT_BUNDLE_IDENTIFIER).processing"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: false
    entitlements:
      path: Rawcut/Rawcut.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development

  RawcutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RawcutTests
    dependencies:
      - target: Rawcut
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rawcut.app.tests
